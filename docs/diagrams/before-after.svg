<svg width="680" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img">
<title>Your workflow before and after the two-agent review system</title>
<desc>Before: you sit between Claude and Codex, carrying every message and tracking whose turn it is — you are the bottleneck. After: Claude, a shared folder, and Codex form a self-checking loop, and you only step in at the end to approve and ship.</desc>
<rect x="1" y="1" width="678" height="428" rx="14" fill="#ffffff" stroke="#e4e4ec"/>
<defs>
<marker id="e" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8a90a0"/></marker>
<marker id="s" markerWidth="9" markerHeight="9" refX="1" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6 Z" fill="#8a90a0"/></marker>
</defs>
<line x1="340" y1="42" x2="340" y2="392" stroke="#e4e4ec" stroke-width="1.5" stroke-dasharray="3 4"/>

<text x="170" y="30" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="0.06em" fill="#8a8a9a">WITHOUT THIS SYSTEM</text>
<rect x="100" y="54" width="140" height="46" rx="9" fill="#eef0f4" stroke="#c3c8d2"/><text x="170" y="82" text-anchor="middle" font-size="15" font-weight="600" fill="#3a3f4b">Claude</text>
<rect x="100" y="164" width="140" height="46" rx="9" fill="#ffe3e3" stroke="#e5484d"/><text x="170" y="186" text-anchor="middle" font-size="15" font-weight="600" fill="#a01722">You</text><text x="170" y="202" text-anchor="middle" font-size="11.5" fill="#b5474b">the go-between</text>
<rect x="100" y="274" width="140" height="46" rx="9" fill="#eef0f4" stroke="#c3c8d2"/><text x="170" y="302" text-anchor="middle" font-size="15" font-weight="600" fill="#3a3f4b">Codex</text>
<line x1="170" y1="102" x2="170" y2="162" stroke="#8a90a0" stroke-width="2" marker-start="url(#s)" marker-end="url(#e)"/>
<line x1="170" y1="212" x2="170" y2="272" stroke="#8a90a0" stroke-width="2" marker-start="url(#s)" marker-end="url(#e)"/>
<text x="170" y="356" text-anchor="middle" font-size="12" fill="#56566a">You carry every message</text>
<text x="170" y="373" text-anchor="middle" font-size="12" fill="#56566a">and track whose turn it is.</text>

<text x="510" y="30" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="0.06em" fill="#8a8a9a">WITH THIS SYSTEM</text>
<rect x="440" y="54" width="140" height="44" rx="9" fill="#eef0f4" stroke="#c3c8d2"/><text x="510" y="81" text-anchor="middle" font-size="15" font-weight="600" fill="#3a3f4b">Claude</text>
<rect x="440" y="134" width="140" height="44" rx="9" fill="#d3f7ee" stroke="#0d9488"/><text x="510" y="161" text-anchor="middle" font-size="15" font-weight="600" fill="#0f5f57">Shared folder</text>
<rect x="440" y="214" width="140" height="44" rx="9" fill="#eef0f4" stroke="#c3c8d2"/><text x="510" y="241" text-anchor="middle" font-size="15" font-weight="600" fill="#3a3f4b">Codex</text>
<rect x="440" y="300" width="140" height="46" rx="9" fill="#dcf5e4" stroke="#22a06b"/><text x="510" y="322" text-anchor="middle" font-size="15" font-weight="600" fill="#12673f">You</text><text x="510" y="338" text-anchor="middle" font-size="11.5" fill="#2b7d55">just approve &amp; ship</text>
<line x1="510" y1="98" x2="510" y2="132" stroke="#8a90a0" stroke-width="2" marker-end="url(#e)"/>
<line x1="510" y1="178" x2="510" y2="212" stroke="#8a90a0" stroke-width="2" marker-end="url(#e)"/>
<line x1="510" y1="258" x2="510" y2="298" stroke="#8a90a0" stroke-width="2" marker-end="url(#e)"/>
<path d="M575,214 C605,196 605,160 583,142" fill="none" stroke="#8a90a0" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#e)"/>
<text x="510" y="382" text-anchor="middle" font-size="12" fill="#56566a">The agents check the folder</text>
<text x="510" y="399" text-anchor="middle" font-size="12" fill="#56566a">themselves &#8212; you only ship.</text>
</svg>
